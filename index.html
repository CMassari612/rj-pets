const supabase = {
  async _fetchPage(table, { order, from, to, search, filters }) {
    const url = new URL(`${SUPABASE_URL}/rest/v1/${table}`);
    url.searchParams.set("order", `${order}.asc`);
    if (search) url.searchParams.set("or",
      `(owner_name.ilike.%${search}%,phone_primary.ilike.%${search}%)`);
    if (filters) Object.entries(filters).forEach(([k,v]) => url.searchParams.set(k, v));
    const res = await fetch(url, {
      headers: {
        apikey: SUPABASE_ANON_KEY,
        Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
        Prefer: "count=exact",
        Range: `${from}-${to}`,
        "Range-Unit": "items",
      },
    });
    if (!res.ok && res.status !== 206) throw new Error(await res.text());
    const cr = res.headers.get("content-range") || "";
    const count = cr.split("/")[1];
    return { data: await res.json(), count: count && count !== "*" ? parseInt(count) : null };
  },
  async getAll(table, { order = "id", search, pageSize = 1000, filters } = {}) {
    const first = await this._fetchPage(table, { order, from: 0, to: pageSize - 1, search, filters });
    const total = first.count ?? first.data.length;
    let data = first.data;
    if (total > pageSize) {
      const pages = [];
      for (let from = pageSize; from < total; from += pageSize) {
        pages.push(this._fetchPage(table, { order, from, to: from + pageSize - 1, search, filters }));
      }
      const rest = await Promise.all(pages);
      data = data.concat(...rest.map(r => r.data));
    }
    return { data, count: total };
  },
  async getByFilter(table, filters, order = "id") {
    const url = new URL(`${SUPABASE_URL}/rest/v1/${table}`);
    url.searchParams.set("order", `${order}.asc`);
    Object.entries(filters).forEach(([k,v]) => url.searchParams.set(k, v));
    const res = await fetch(url, {
      headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${SUPABASE_ANON_KEY}` },
    });
    if (!res.ok) throw new Error(await res.text());
    return { data: await res.json() };
  },
  async update(table, id, data) {
    const url = new URL(`${SUPABASE_URL}/rest/v1/${table}`);
    url.searchParams.set("id", `eq.${id}`);
    const res = await fetch(url, {
      method: "PATCH",
      headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
        "Content-Type": "application/json", Prefer: "return=representation" },
      body: JSON.stringify(data),
    });
    if (!res.ok) throw new Error(await res.text());
    return { data: await res.json() };
  },
  async insert(table, data) {
    const url = new URL(`${SUPABASE_URL}/rest/v1/${table}`);
    const res = await fetch(url, {
      method: "POST",
      headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
        "Content-Type": "application/json", Prefer: "return=representation" },
      body: JSON.stringify(data),
    });
    if (!res.ok) throw new Error(await res.text());
    return { data: await res.json() };
  },
  async delete(table, id) {
    const url = new URL(`${SUPABASE_URL}/rest/v1/${table}`);
    url.searchParams.set("id", `eq.${id}`);
    const res = await fetch(url, {
      method: "DELETE",
      headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${SUPABASE_ANON_KEY}` },
    });
    if (!res.ok) throw new Error(await res.text());
  },
};

// Helpers
const fmtPhone = (p) => {
  if (!p) return "";
  const d = p.replace(/\D/g,"");
  return d.length===10 ? `${d.slice(0,3)}-${d.slice(3,6)}-${d.slice(6)}` : p;
};
const fmtDate = (d) => {
  if (!d) return "";
  const dt = new Date(d+"T00:00:00");
  return `${dt.getMonth()+1}/${dt.getDate()}/${dt.getFullYear()}`;
};
const isExpired = (d) => d ? new Date(d) < new Date() : false;
const isSoon = (d) => {
  if (!d) return false;
  const dt = new Date(d), now = new Date();
  return dt > now && dt - now < 30*86400000;
};

// Calculate days between two dates. PM pickup adds 1 extra day.
const calcDays = (dateIn, dateOut, timeOut) => {
  if (!dateIn || !dateOut) return null;
  const d1 = new Date(dateIn+"T00:00:00");
  const d2 = new Date(dateOut+"T00:00:00");
  let days = Math.round((d2 - d1) / 86400000);
  if (days < 0) days = 0;
  if (timeOut === "PM") days += 1;
  return days || 1; // minimum 1 day
};

// Dropdown Field

        <option value="">--</option>

function RJPetsApp() {
  const [records, setRecords] = useState([]);
  const [idx, setIdx] = useState(0);
  const [total, setTotal] = useState(0);
  const [editing, setEditing] = useState(false);
  const [editData, setEditData] = useState({});
  const [query, setQuery] = useState("");
  const [loading, setLoading] = useState(true);
  const [saving, setSaving] = useState(false);
  const [toast, setToast] = useState(null);
  const [connected, setConnected] = useState(false);
  const [tab, setTab] = useState("info");
  const [confirmDelete, setConfirmDelete] = useState(false);

  // Pets state
  const [pets, setPets] = useState([]);
  const [petIdx, setPetIdx] = useState(0);
  const [editingPet, setEditingPet] = useState(false);
  const [editPetData, setEditPetData] = useState({});
  const [savingPet, setSavingPet] = useState(false);
  const [showCageCard, setShowCageCard] = useState(false);

  const r = editing ? editData : (records[idx] || null);
  const currentPet = editingPet ? editPetData : (pets[petIdx] || null);

  const showToast = (msg, type="success") => {
    setToast({msg,type});
    setTimeout(()=>setToast(null), 2500);
  };

  // Fetch clients
  const fetchRecords = useCallback(async (search="") => {
    setLoading(true);
    try {
      const {data,count} = await supabase.getAll("clients",{search:search||undefined});
      setRecords(data); setTotal(count||data.length); setIdx(0); setConnected(true);
    } catch {
      setRecords([]); setTotal(0); setIdx(0); setConnected(false);
    }
    setLoading(false);
  },[]);

  // Fetch pets for current client
  const fetchPets = useCallback(async (clientId) => {
    if (!clientId || !connected) { setPets([]); setPetIdx(0); return; }
    try {
      const {data} = await supabase.getByFilter("pets", { client_id: `eq.${clientId}` });
      setPets(data || []);
      setPetIdx(0);
    } catch {
      setPets([]);
      setPetIdx(0);
    }
  }, [connected]);

  useEffect(()=>{fetchRecords()},[fetchRecords]);

  // When record changes, fetch pets
  useEffect(()=>{
    const client = records[idx];
    if (client) fetchPets(client.id);
    else { setPets([]); setPetIdx(0); }
    setEditingPet(false); setEditPetData({});
  },[idx, records, fetchPets]);

  const go = (i) => { if(i>=0&&i<records.length){setIdx(i);setEditing(false);setEditData({});setEditingPet(false);setEditPetData({});}};

  // Client editing
  const startEdit = () => { setEditing(true); setEditData({...records[idx]}); };
  const onClientChange = (f,v) => {
    setEditData(p => {
      const next = {...p, [f]: v};
      // Auto-calc days when dates or time_out change
      if (f === "date_in" || f === "date_out" || f === "time_out") {
        const dIn = f === "date_in" ? v : next.date_in;
        const dOut = f === "date_out" ? v : next.date_out;
        const tOut = f === "time_out" ? v : next.time_out;
        next.num_days = calcDays(dIn, dOut, tOut);
      }
      // Auto-calc Total = Price * Days - Extra
      const days = next.num_days || 0;
      const price = next.price_per_day || 0;
      const extra = next.daycare_extra || 0;
      next.total = days * price - extra;
      // Auto-calc Balance = Total - Down Pmt - Disc + Bath
      const down = next.down_payment || 0;
      const disc = next.cash_discount || 0;
      const bath = next.bath || 0;
      next.balance = next.total - down - disc + bath;
      return next;
    });
  };
  const cancelEdit = () => { setEditing(false); setEditData({}); };

  const saveClient = async () => {
    setSaving(true);
    try {
      const {id,created_at,updated_at,...rest} = editData;
      if (connected) await supabase.update("clients",id,rest);
      setRecords(p=>p.map(x=>x.id===id?{...x,...rest}:x));
      setEditing(false); setEditData({}); showToast("Client saved!");
    } catch(e) { showToast("Save failed: "+e.message,"error"); }
    setSaving(false);
  };

  // Pet editing
  const startPetEdit = () => { setEditingPet(true); setEditPetData({...pets[petIdx]}); };
  const onPetChange = (f,v) => setEditPetData(p=>({...p,[f]:v}));
  const cancelPetEdit = () => { setEditingPet(false); setEditPetData({}); };

  const savePet = async () => {
    setSavingPet(true);
    try {
      const {id,created_at,updated_at,client_id,...rest} = editPetData;
      if (connected) await supabase.update("pets",id,rest);
      setPets(p=>p.map(x=>x.id===id?{...x,...rest}:x));
      setEditingPet(false); setEditPetData({}); showToast("Pet saved!");
    } catch(e) { showToast("Pet save failed: "+e.message,"error"); }
    setSavingPet(false);
  };

  // Delete pet
  const [confirmDeletePet, setConfirmDeletePet] = useState(false);
  const deletePet = async () => {
    const pet = pets[petIdx];
    if (!pet) return;
    try {
      if (connected) await supabase.delete("pets", pet.id);
      const newPets = pets.filter(p => p.id !== pet.id);
      setPets(newPets);
      setPetIdx(Math.min(petIdx, Math.max(0, newPets.length - 1)));
      setConfirmDeletePet(false);
      setEditingPet(false); setEditPetData({});
      showToast("Pet deleted");
    } catch(e) { showToast("Delete pet failed: " + e.message, "error"); }
  };

  // Add new pet to current client
  const addPet = async () => {
    const client = records[idx];
    if (!client) return;
    const blank = {
      client_id: client.id, pet_name: "New Pet", breed: "", date_of_birth: null,
      vet: "", dhpp_date: null, bordetella_exp: null, rabies_exp: null, felv_date: null,
      medication_notes: "", feeding_instructions: "", food_brand: "", notes: "", note_date: null
    };
    try {
      if (connected) {
        const {data} = await supabase.insert("pets", blank);
        setPets(p => [...p, data[0]]);
        setPetIdx(pets.length);
      }
      setEditingPet(true); setEditPetData(connected ? {} : {...blank, id: Date.now()});
    } catch(e) { showToast("Add pet failed: "+e.message,"error"); }
  };

  // New client
  const newRecord = async () => {
    const blank = { owner_name:"New Owner", address:"", phone_primary:"", phone_secondary:"",
      email:"", emergency_contact:"", vet:"",
      date_in:null, date_out:null, time_in:"AM", time_out:"AM",
      num_days:null, price_per_day:null, total:null, balance:null,
      last_service_date:null, down_payment:null, percent_off:null,
      cash_discount:0, daycare_extra:0, bath:0,
      date_of_birth:null, num_pets:null, note_date:null,
      // Legacy pet fields kept for compatibility
      pet_name:"", breed:"", dhpp_date:null, bordetella_exp:null, rabies_exp:null,
      felv_date:null, feeding_instructions:"", food_brand:"", medication_notes:"", notes:"" };
    try {
      if (connected) {
        const {data} = await supabase.insert("clients",blank);
        const newClient = data[0];
        setRecords(p=>[...p,newClient]); setIdx(records.length); setTotal(t=>t+1);
        // Also create a default pet
        await supabase.insert("pets", { client_id: newClient.id, pet_name: "New Pet" });
      } else {
        const fakeId = Math.max(0,...records.map(r=>r.id))+1;
        setRecords(p=>[...p,{id:fakeId,...blank}]); setIdx(records.length); setTotal(t=>t+1);
      }
      startEdit();
    } catch(e) { showToast("Create failed: "+e.message,"error"); }
  };

  // Delete client
  const deleteRecord = async () => {
    if (!r) return;
    try {
      if (connected) await supabase.delete("clients",r.id);
      const newRecs = records.filter(x=>x.id!==r.id);
      setRecords(newRecs); setTotal(t=>t-1);
      setIdx(Math.min(idx,newRecs.length-1));
      setConfirmDelete(false); setEditing(false);
      showToast("Record deleted");
    } catch(e) { showToast("Delete failed: "+e.message,"error"); }
  };

  const handleSearch = async () => { await fetchRecords(query); };
  const clearSearch = async () => { setQuery(""); await fetchRecords(""); };

  useEffect(()=>{
    const h = (e) => {
      if(editing||editingPet) return;
      if(e.key==="ArrowLeft"){e.preventDefault();go(idx-1);}
      if(e.key==="ArrowRight"){e.preventDefault();go(idx+1);}
    };
    window.addEventListener("keydown",h);
    return ()=>window.removeEventListener("keydown",h);
  });

  if (loading) return (
    <div className="flex items-center justify-center h-screen bg-gray-900">
      <div className="text-center">
        <div className="animate-spin w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full mx-auto mb-4"/>
        <p className="text-gray-400">Loading RJ Pets...</p>
      </div>
    </div>
  );

  return (
    <div className="min-h-screen bg-gray-900 text-gray-100">
      {/* Cage Card Modal */}
      {showCageCard && currentPet && r && (
        <CageCard client={r} pet={currentPet} onClose={()=>setShowCageCard(false)} />
      )}

      {/* Toolbar */}
      <div className="bg-gray-800 border-b border-gray-700 px-4 py-2 flex items-center justify-between flex-wrap gap-2 no-print">
        <div className="flex items-center gap-3">
          <span className="text-xl font-black tracking-wider text-blue-400">RJ PETS</span>
          <span className={`text-xs px-2 py-0.5 rounded-full font-medium ${connected?"bg-green-700 text-green-200":"bg-yellow-700 text-yellow-200"}`}>
            {connected?"LIVE":"DEMO"}
          </span>
        </div>
        <div className="flex items-center gap-1.5">
          <button onClick={()=>go(0)} className="px-2 py-1 bg-gray-700 rounded text-gray-300 hover:bg-gray-600 text-sm">&#x23EE;</button>
          <button onClick={()=>go(idx-1)} className="px-3 py-1 bg-gray-700 rounded text-gray-300 hover:bg-gray-600 text-sm">&larr;</button>
          <span className="text-sm font-mono text-gray-400 mx-2 min-w-[80px] text-center">
            {records.length>0?`${idx+1} of ${records.length}`:"0 of 0"}
          </span>
          <button onClick={()=>go(idx+1)} className="px-3 py-1 bg-gray-700 rounded text-gray-300 hover:bg-gray-600 text-sm">&rarr;</button>
          <button onClick={()=>go(records.length-1)} className="px-2 py-1 bg-gray-700 rounded text-gray-300 hover:bg-gray-600 text-sm">&#x23ED;</button>
          <span className="text-xs text-gray-500 ml-2">{total.toLocaleString()} records</span>
        </div>
        <div className="flex items-center gap-2">
          {!editing ? (
            <>
              <button onClick={newRecord} className="px-3 py-1.5 bg-green-700 rounded hover:bg-green-600 text-sm font-medium">+ New</button>
              <button onClick={startEdit} disabled={!r} className="px-3 py-1.5 bg-blue-700 rounded hover:bg-blue-600 text-sm font-medium disabled:opacity-30">Edit</button>
              <button onClick={()=>setShowCageCard(true)} disabled={!currentPet}
                className="px-3 py-1.5 bg-purple-700 rounded hover:bg-purple-600 text-sm font-medium disabled:opacity-30">
                🖨 Cage Card
              </button>
            </>
          ) : (
            <>
              <button onClick={saveClient} disabled={saving} className="px-3 py-1.5 bg-green-700 rounded hover:bg-green-600 text-sm font-medium">
                {saving?"Saving...":"Save Client"}
              </button>
              <button onClick={cancelEdit} className="px-3 py-1.5 bg-gray-600 rounded hover:bg-gray-500 text-sm">Cancel</button>
              <button onClick={()=>setConfirmDelete(true)} className="px-3 py-1.5 bg-red-800 rounded hover:bg-red-700 text-sm">Delete</button>
            </>
          )}
        </div>
      </div>

      {/* Search */}
      <div className="bg-gray-800 px-4 py-2 flex items-center gap-2 border-b border-gray-700 no-print">
        <span className="text-xs text-gray-500 font-semibold uppercase">Quick Find</span>
        <input value={query} onChange={e=>setQuery(e.target.value)}
          onKeyDown={e=>e.key==="Enter"&&handleSearch()}
          placeholder="Search owner, phone..."
          className="flex-1 px-3 py-1.5 rounded bg-gray-700 text-white placeholder-gray-500 text-sm border border-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500" />
        <button onClick={handleSearch} className="px-4 py-1.5 bg-blue-700 rounded hover:bg-blue-600 text-sm font-medium">Find</button>
        {query && <button onClick={clearSearch} className="px-3 py-1.5 bg-gray-700 rounded hover:bg-gray-600 text-sm">Show All</button>}
      </div>

      {/* Toast */}
      {toast && (
        <div className={`text-center py-2 text-sm font-medium no-print ${toast.type==="error"?"bg-red-900 text-red-200":"bg-green-900 text-green-200"}`}>
          {toast.msg}
        </div>
      )}

      {/* Delete Confirm */}
      {confirmDelete && (
        <div className="fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center z-50">
          <div className="bg-gray-800 rounded-xl shadow-2xl p-6 max-w-sm mx-4 border border-gray-600">
            <h3 className="text-lg font-bold mb-2">Delete Record?</h3>
            <p className="text-gray-400 mb-4 text-sm">
              Permanently delete <strong>{r?.owner_name}</strong> and all their pets? This cannot be undone.
            </p>
            <div className="flex gap-2 justify-end">
              <button onClick={()=>setConfirmDelete(false)} className="px-4 py-2 bg-gray-600 rounded hover:bg-gray-500 text-sm">Cancel</button>
              <button onClick={deleteRecord} className="px-4 py-2 bg-red-700 text-white rounded hover:bg-red-600 text-sm font-medium">Delete</button>
            </div>
          </div>
        </div>
      )}

      {!r ? (
        <div className="flex items-center justify-center py-20 text-gray-500 no-print">
          No records. {query?"Try a different search.":"Click '+ New' to add one."}
        </div>
      ) : (
        <div className="max-w-5xl mx-auto mt-4 px-4 pb-8 space-y-3 no-print">

          {/* OWNER SECTION */}
          <div className="bg-gray-800 rounded-xl p-5 border border-gray-700">
            <div className="flex items-start justify-between flex-wrap gap-4">
              <div className="flex-1 min-w-[300px]">
                <div className="flex items-baseline gap-3 mb-3">
                  <span className="text-xs text-gray-500 uppercase font-semibold">Owner</span>
                  <F value={r.owner_name} field="owner_name" editing={editing} onChange={onClientChange} big w="300px"/>
                </div>
                <div className="grid grid-cols-2 gap-x-8 gap-y-2">
                  <F label="Phone" value={r.phone_primary} field="phone_primary" editing={editing} onChange={onClientChange} type="phone" w="180px"/>
                  <F label="Email" value={r.email} field="email" editing={editing} onChange={onClientChange} w="260px"/>
                  <F label="Phone 2" value={r.phone_secondary} field="phone_secondary" editing={editing} onChange={onClientChange} type="phone" w="180px"/>
                  <F label="Emergency" value={r.emergency_contact} field="emergency_contact" editing={editing} onChange={onClientChange} w="260px"/>
                </div>
              </div>
              <div className="text-right max-w-xs">
                <F label="Address" value={r.address} field="address" editing={editing} onChange={onClientChange} w="280px"/>
              </div>
            </div>
          </div>

          {/* SERVICE / BOOKING */}
          <div className="bg-gray-800 rounded-xl p-5 border border-gray-700">
            <div className="flex items-center gap-2 mb-3">
              <span className="text-xs text-gray-500 uppercase font-semibold">Booking</span>
              <F label="Last Service" value={r.last_service_date} field="last_service_date" editing={editing} onChange={onClientChange} type="date"/>
            </div>
            <div className="grid grid-cols-4 gap-4 items-end">
              <F label="Date In" value={r.date_in} field="date_in" editing={editing} onChange={onClientChange} type="date"/>
              <Dropdown label="Time In" value={r.time_in} field="time_in" editing={editing} onChange={onClientChange} options={TIME_OPTIONS}/>
              <F label="Date Out" value={r.date_out} field="date_out" editing={editing} onChange={onClientChange} type="date"/>
              <Dropdown label="Time Out" value={r.time_out} field="time_out" editing={editing} onChange={onClientChange} options={TIME_OPTIONS}/>
            </div>
            <div className="grid grid-cols-8 gap-3 items-end mt-3">
              <div className="flex flex-col">
                <span className="text-xs text-gray-400 leading-none"># Days</span>
                <span className="text-lg font-bold text-blue-300">{r.num_days ?? "--"}</span>
              </div>
              <Dropdown label="Price/Day" value={r.price_per_day} field="price_per_day" editing={editing} onChange={onClientChange}
                options={PRICE_OPTIONS} suffix="" w="80px"/>
              <F label="DC/Extra" value={r.daycare_extra} field="daycare_extra" editing={editing} onChange={onClientChange} type="money" w="80px"/>
              <div className="flex flex-col">
                <span className="text-xs text-gray-400 leading-none">Total</span>
                <span className="text-lg font-bold text-gray-100">{r.total != null ? `$${Number(r.total).toFixed(2)}` : "--"}</span>
              </div>
              <F label="Down Pmt" value={r.down_payment} field="down_payment" editing={editing} onChange={onClientChange} type="money" w="80px"/>
              <F label="Cash Disc." value={r.cash_discount} field="cash_discount" editing={editing} onChange={onClientChange} type="money" w="80px"/>
              <F label="Bath" value={r.bath} field="bath" editing={editing} onChange={onClientChange} type="money" w="80px"/>
              <div className="flex flex-col">
                <span className="text-xs text-gray-400 leading-none">Balance</span>
                <span className="text-xl font-bold text-green-400">
                  {r.balance != null ? `$${Number(r.balance).toFixed(2)}` : "--"}
                </span>
              </div>
            </div>
            <div className="flex items-end gap-4 mt-3">
              <Dropdown label="% Off" value={r.percent_off} field="percent_off" editing={editing} onChange={onClientChange}
                options={PERCENT_OFF_OPTIONS} suffix="%" w="80px"/>
            </div>
            {editing && (
              <p className="text-xs text-gray-500 mt-2 italic">
                Total = Price &times; Days &minus; Extra &nbsp;|&nbsp; Balance = Total &minus; Down &minus; Disc + Bath
              </p>
            )}
          </div>

          {/* PET TABS — Pet 1, Pet 2, etc. */}
          <div className="bg-gray-800 rounded-xl border border-gray-700 overflow-hidden">
            <div className="flex border-b border-gray-700 items-center">
              {pets.map((p, i) => (
                <button key={p.id} onClick={() => { setPetIdx(i); setEditingPet(false); setEditPetData({}); }}
                  className={`px-4 py-2.5 text-sm font-medium transition-all ${
                    petIdx===i
                      ? "bg-gray-900 text-blue-400 border-b-2 border-blue-500"
                      : "text-gray-500 hover:text-gray-300 hover:bg-gray-750"}`}>
                  Pet {i+1}: {p.pet_name || "?"}
                </button>
              ))}
              {pets.length < 5 && !editing && (
                <button onClick={addPet} className="px-3 py-2.5 text-sm text-green-400 hover:text-green-300 hover:bg-gray-750 font-medium">
                  + Add Pet
                </button>
              )}
            </div>

            {currentPet ? (
              <div className="p-5">
                {/* Delete Pet Confirm */}
                {confirmDeletePet && (
                  <div className="fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center z-50">
                    <div className="bg-gray-800 rounded-xl shadow-2xl p-6 max-w-sm mx-4 border border-gray-600">
                      <h3 className="text-lg font-bold mb-2">Delete Pet?</h3>
                      <p className="text-gray-400 mb-4 text-sm">
                        Permanently delete <strong>{currentPet?.pet_name}</strong>? This cannot be undone.
                      </p>
                      <div className="flex gap-2 justify-end">
                        <button onClick={()=>setConfirmDeletePet(false)} className="px-4 py-2 bg-gray-600 rounded hover:bg-gray-500 text-sm">Cancel</button>
                        <button onClick={deletePet} className="px-4 py-2 bg-red-700 text-white rounded hover:bg-red-600 text-sm font-medium">Delete Pet</button>
                      </div>
                    </div>
                  </div>
                )}

                {/* Pet action bar */}
                <div className="flex items-center justify-between mb-4">
                  <div className="flex items-center gap-2">
                    {!editingPet ? (
                      <>
                        <button onClick={startPetEdit} className="px-3 py-1 bg-blue-700 rounded hover:bg-blue-600 text-xs font-medium">Edit Pet</button>
                        <button onClick={()=>setConfirmDeletePet(true)} className="px-3 py-1 bg-red-800 rounded hover:bg-red-700 text-xs font-medium">Delete Pet</button>
                      </>
                    ) : (
                      <>
                        <button onClick={savePet} disabled={savingPet} className="px-3 py-1 bg-green-700 rounded hover:bg-green-600 text-xs font-medium">
                          {savingPet?"Saving...":"Save Pet"}
                        </button>
                        <button onClick={cancelPetEdit} className="px-3 py-1 bg-gray-600 rounded hover:bg-gray-500 text-xs">Cancel</button>
                      </>
                    )}
                  </div>
                </div>

                {/* Tab nav inside pet */}
                <div className="flex gap-1 mb-4">
                  {[
                    {id:"info",label:"Info"},
                    {id:"feed",label:"Feeding"},
                    {id:"vax",label:"Vaccines"},
                    {id:"notes",label:"Notes"},
                  ].map(t=>(
                    <button key={t.id} onClick={()=>setTab(t.id)}
                      className={`px-3 py-1.5 text-xs rounded font-medium transition-all ${
                        tab===t.id
                          ? "bg-blue-900 text-blue-300 border border-blue-600"
                          : "bg-gray-700 text-gray-400 hover:text-gray-200"}`}>
                      {t.label}
                    </button>
                  ))}
                </div>

                {/* Pet Info */}
                {tab==="info" && (
                  <div>
                    <div className="flex items-baseline gap-4 mb-4">
                      <span className="text-xs text-gray-500 uppercase font-semibold">Pet Name</span>
                      <F value={currentPet.pet_name} field="pet_name" editing={editingPet} onChange={onPetChange} big w="250px"/>
                    </div>
                    <div className="grid grid-cols-3 gap-6">
                      <F label="Breed" value={currentPet.breed} field="breed" editing={editingPet} onChange={onPetChange} w="180px"/>
                      <F label="VET" value={currentPet.vet} field="vet" editing={editingPet} onChange={onPetChange} w="180px"/>
                      <F label="Date of Birth" value={currentPet.date_of_birth} field="date_of_birth" editing={editingPet} onChange={onPetChange} type="date" w="160px"/>
                    </div>
                    <div className="mt-4">
                      <span className="text-xs text-gray-500 block mb-1">Medications</span>
                      {editingPet ? (
                        <textarea value={currentPet.medication_notes??""} onChange={e=>onPetChange("medication_notes",e.target.value||null)}
                          rows={3} className="w-full bg-gray-700 border border-gray-500 rounded px-2 py-1.5 text-sm text-white"/>
                      ) : (
                        <p className="text-sm whitespace-pre-wrap">{currentPet.medication_notes || <span className="text-gray-600">&mdash;</span>}</p>
                      )}
                    </div>
                  </div>
                )}

                {/* Feeding */}
                {tab==="feed" && (
                  <div className="space-y-4">
                    <div>
                      <span className="text-xs text-gray-500 block mb-1">Food Brand</span>
                      {editingPet ? (
                        <input value={currentPet.food_brand??""} onChange={e=>onPetChange("food_brand",e.target.value||null)}
                          className="w-full bg-gray-700 border border-gray-500 rounded px-2 py-1.5 text-sm text-white"/>
                      ) : (
                        <p className="text-sm">{currentPet.food_brand || <span className="text-gray-600">&mdash;</span>}</p>
                      )}
                    </div>
                    <div>
                      <span className="text-xs text-gray-500 block mb-1">Feeding Instructions</span>
                      {editingPet ? (
                        <textarea value={currentPet.feeding_instructions??""} onChange={e=>onPetChange("feeding_instructions",e.target.value||null)}
                          rows={4} className="w-full bg-gray-700 border border-gray-500 rounded px-2 py-1.5 text-sm text-white"/>
                      ) : (
                        <p className="text-sm whitespace-pre-wrap">{currentPet.feeding_instructions || <span className="text-gray-600">&mdash;</span>}</p>
                      )}
                    </div>
                  </div>
                )}

                {/* Vaccines */}
                {tab==="vax" && (
                  <div>
                    <p className="text-sm text-gray-400 mb-3">Vaccinations for <strong className="text-gray-200">{currentPet.pet_name}</strong></p>
                    <div className="space-y-1">
                      <Vax label="DHPP" date={currentPet.dhpp_date} editing={editingPet} field="dhpp_date" onChange={onPetChange}/>
                      <Vax label="Bord" date={currentPet.bordetella_exp} editing={editingPet} field="bordetella_exp" onChange={onPetChange}/>
                      <Vax label="Rabies" date={currentPet.rabies_exp} editing={editingPet} field="rabies_exp" onChange={onPetChange}/>
                      <Vax label="FeLV" date={currentPet.felv_date} editing={editingPet} field="felv_date" onChange={onPetChange}/>
                    </div>
                  </div>
                )}

                {/* Notes */}
                {tab==="notes" && (
                  <div>
                    <span className="text-xs text-gray-500 block mb-1">Notes</span>
                    {editingPet ? (
                      <textarea value={currentPet.notes??""} onChange={e=>onPetChange("notes",e.target.value||null)}
                        rows={8} className="w-full bg-gray-700 border border-gray-500 rounded px-2 py-1.5 text-sm text-white"/>
                    ) : (
                      <p className="text-sm whitespace-pre-wrap min-h-[150px]">{currentPet.notes || <span className="text-gray-600">No notes</span>}</p>
                    )}
                  </div>
                )}
              </div>
            ) : (
              <div className="p-8 text-center text-gray-500">
                No pets for this owner. Click "+ Add Pet" to create one.
              </div>
            )}
          </div>

          <p className="text-center text-xs text-gray-600 mt-2">
            Use &larr; &rarr; arrow keys to navigate records
          </p>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<RJPetsApp/>);
  </script>
</body>
</html>
