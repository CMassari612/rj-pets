const supabase = {
  async _fetchPage(table, { order, from, to, search, filters }) {
    const url = new URL(`${SUPABASE_URL}/rest/v1/${table}`);
    url.searchParams.set("order", `${order}.asc`);
    if (search) url.searchParams.set("or",
      `(owner_name.ilike.%${search}%,phone_primary.ilike.%${search}%,phone_secondary.ilike.%${search}%,email.ilike.%${search}%,address.ilike.%${search}%)`);
    if (filters) Object.entries(filters).forEach(([k,v]) => url.searchParams.set(k, v));
    const res = await fetch(url, {
      headers: {
        apikey: SUPABASE_ANON_KEY,
        Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
        Prefer: "count=exact",
        Range: `${from}-${to}`,
        "Range-Unit": "items",
      },
    });
    if (!res.ok && res.status !== 206) throw new Error(await res.text());
    const cr = res.headers.get("content-range") || "";
    const count = cr.split("/")[1];
    return { data: await res.json(), count: count && count !== "*" ? parseInt(count) : null };
  },
  async getAll(table, { order = "id", search, pageSize = 1000, filters } = {}) {
    const first = await this._fetchPage(table, { order, from: 0, to: pageSize - 1, search, filters });
    const total = first.count ?? first.data.length;
    let data = first.data;
    if (total > pageSize) {
      const pages = [];
      for (let from = pageSize; from < total; from += pageSize) {
        pages.push(this._fetchPage(table, { order, from, to: from + pageSize - 1, search, filters }));
      }
      const rest = await Promise.all(pages);
      data = data.concat(...rest.map(r => r.data));
    }
    return { data, count: total };
  },
  async getByFilter(table, filters, order = "id") {
    const url = new URL(`${SUPABASE_URL}/rest/v1/${table}`);
    url.searchParams.set("order", `${order}.asc`);
    Object.entries(filters).forEach(([k,v]) => url.searchParams.set(k, v));
    const res = await fetch(url, {
      headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${SUPABASE_ANON_KEY}` },
    });
    if (!res.ok) throw new Error(await res.text());
    return { data: await res.json() };
  },
  async update(table, id, data) {
    const url = new URL(`${SUPABASE_URL}/rest/v1/${table}`);
    url.searchParams.set("id", `eq.${id}`);
    const res = await fetch(url, {
      method: "PATCH",
      headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
        "Content-Type": "application/json", Prefer: "return=representation" },
      body: JSON.stringify(data),
    });
    if (!res.ok) throw new Error(await res.text());
    return { data: await res.json() };
  },
  async insert(table, data) {
    const url = new URL(`${SUPABASE_URL}/rest/v1/${table}`);

      method: "POST",
      headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
        "Content-Type": "application/json", Prefer: "return=representation" },
      body: JSON.stringify(data),
    });
    if (!res.ok) throw new Error(await res.text());
    return { data: await res.json() };
  },
  async delete(table, id) {
    const url = new URL(`${SUPABASE_URL}/rest/v1/${table}`);
    url.searchParams.set("id", `eq.${id}`);
    const res = await fetch(url, {
      method: "DELETE",
      headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${SUPABASE_ANON_KEY}` },
    });
    if (!res.ok) throw new Error(await res.text());
  },
};

// Helpers
const fmtPhone = (p) => {
  if (!p) return "";
  const d = p.replace(/\D/g,"");
  return d.length===10 ? `${d.slice(0,3)}-${d.slice(3,6)}-${d.slice(6)}` : p;
};
const fmtDate = (d) => {
  if (!d) return "";
  const dt = new Date(d+"T00:00:00");
  return `${dt.getMonth()+1}/${dt.getDate()}/${dt.getFullYear()}`;
};
const parseDate = (str) => {
  if (!str || !str.trim()) return null;
  const parts = str.trim().split('/');
  if (parts.length === 3) {
    const m = parseInt(parts[0]);
    const d = parseInt(parts[1]);
    let y = parseInt(parts[2]);
    if (y < 100) y += 2000;
    if (m >= 1 && m <= 12 && d >= 1 && d <= 31 && y >= 1900 && y <= 2100) {
      return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    }
  }
  return undefined; // invalid
};
const isExpired = (d) => d ? new Date(d) < new Date() : false;
const isSoon = (d) => {
  if (!d) return false;
  const dt = new Date(d), now = new Date();
  return dt > now && dt - now < 30*86400000;
};

// Calculate days between two dates. PM pickup adds 1 extra day.
const calcDays = (dateIn, dateOut, timeOut) => {
  if (!dateIn || !dateOut) return null;
  const d1 = new Date(dateIn+"T00:00:00");
  const d2 = new Date(dateOut+"T00:00:00");
  let days = Math.round((d2 - d1) / 86400000);
  if (days < 0) days = 0;
  if (timeOut === "PM") days += 1;
  return days || 1;
};

// ====== DATE INPUT (typed, not calendar) ======
function DateInput({ value, onChange, field }) {
  const [text, setText] = useState(fmtDate(value) || "");
  useEffect(() => { setText(fmtDate(value) || ""); }, [value]);
  const handleBlur = () => {
    if (!text.trim()) { onChange(field, null); return; }
    const iso = parseDate(text);
    if (iso !== undefined) onChange(field, iso);
    else setText(fmtDate(value) || "");
  };
  return (
    <input type="text" value={text} onChange={e => setText(e.target.value)}
      onBlur={handleBlur} onKeyDown={e => { if (e.key === "Enter") e.target.blur(); }}
      placeholder="M/D/YYYY" style={{width:"100%"}} />
  );
}

  const showToast = (msg, type="success") => {
    setToast({msg,type});
    setTimeout(()=>setToast(null), 2500);
  };

  // Fetch clients (with pet name search support)
  const fetchRecords = useCallback(async (search="") => {
    setLoading(true);
    try {
      const {data,count} = await supabase.getAll("clients",{search:search||undefined});
      let allData = data;

      // Also search pets by pet_name when searching
      if (search) {
        try {
          const petUrl = new URL(`${SUPABASE_URL}/rest/v1/pets`);
          petUrl.searchParams.set("select", "client_id");
          petUrl.searchParams.set("pet_name", `ilike.%${search}%`);
          const petRes = await fetch(petUrl, {
            headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${SUPABASE_ANON_KEY}` }
          });
          if (petRes.ok) {
            const petMatches = await petRes.json();
            const existingIds = new Set(allData.map(c => c.id));
            const newIds = [...new Set(petMatches.map(p => p.client_id))].filter(id => !existingIds.has(id));
            if (newIds.length > 0) {
              const {data: extra} = await supabase.getByFilter("clients", { id: `in.(${newIds.join(",")})` });
              allData = [...allData, ...extra];
            }
          }
        } catch {} // pet search is best-effort
      }

      setRecords(allData); setTotal(allData.length); setIdx(0); setConnected(true);
    } catch {
      setRecords([]); setTotal(0); setIdx(0); setConnected(false);
    }
    setLoading(false);
  },[]);

  // Fetch pets for current client
  const fetchPets = useCallback(async (clientId) => {
    if (!clientId || !connected) { setPets([]); setPetIdx(0); return; }
    try {
      const {data} = await supabase.getByFilter("pets", { client_id: `eq.${clientId}` });
      setPets(data || []);
      setPetIdx(0);
    } catch {
      setPets([]);
      setPetIdx(0);
    }
  }, [connected]);

  useEffect(()=>{fetchRecords()},[fetchRecords]);

    const client = records[idx];
    if (client) fetchPets(client.id);
    else { setPets([]); setPetIdx(0); }

  const go = (i) => { if(i>=0&&i<records.length){setIdx(i);setEditing(false);setEditData({});setEditingPet(false);setEditPetData({});}};

  // Client editing
  const startEdit = () => {

  // Recalc formula helper
  const recalc = (next) => {
    const days = next.num_days || 0;
    const price = next.price_per_day || 0;
    const extras = next.daycare_extra || 0;
    const pctOff = next.percent_off || 0;

    let subtotal = (days * price) + extras;
    if (pctOff > 0) subtotal = subtotal * (1 - pctOff / 100);
    next.total = Math.round(subtotal * 100) / 100;

    const down = next.down_payment || 0;

  const onPetChange = (f,v) => setEditPetData(p=>({...p,[f]:v}));
  const cancelPetEdit = () => { setEditingPet(false); setEditPetData({}); };

  const savePet = async () => {
    setSavingPet(true);
    try {
      const {id,created_at,updated_at,client_id,...rest} = editPetData;
      if (connected) await supabase.update("pets",id,rest);
      setPets(p=>p.map(x=>x.id===id?{...x,...rest}:x));
      setEditingPet(false); setEditPetData({}); showToast("Pet saved!");
    } catch(e) { showToast("Pet save failed: "+e.message,"error"); }
    setSavingPet(false);
  };

  const deletePet = async () => {
    const pet = pets[petIdx];
    if (!pet) return;
    try {
      if (connected) await supabase.delete("pets", pet.id);
      const newPets = pets.filter(p => p.id !== pet.id);
      setPets(newPets);
      setPetIdx(Math.min(petIdx, Math.max(0, newPets.length - 1)));
      setConfirmDeletePet(false);
      setEditingPet(false); setEditPetData({});
      showToast("Pet deleted");
    } catch(e) { showToast("Delete pet failed: " + e.message, "error"); }
  };

  const addPet = async () => {
    const client = records[idx];
    if (!client) return;
    const blank = {
      client_id: client.id, pet_name: "New Pet", breed: "", date_of_birth: null,
      vet: "", dhpp_date: null, bordetella_exp: null, rabies_exp: null, felv_date: null,
      medication_notes: "", feeding_instructions: "", food_brand: "", notes: "", note_date: null
    };
    try {
      if (connected) {
        const {data} = await supabase.insert("pets", blank);
        setPets(p => [...p, data[0]]);
        setPetIdx(pets.length);
      }
      setEditingPet(true); setEditPetData(connected ? {} : {...blank, id: Date.now()});
    } catch(e) { showToast("Add pet failed: "+e.message,"error"); }
  };

  const newRecord = async () => {
    const blank = { owner_name:"New Owner", address:"", phone_primary:"", phone_secondary:"",
      email:"", emergency_contact:"", vet:"",
      date_in:null, date_out:null, time_in:"AM", time_out:"AM",
      num_days:null, price_per_day:null, total:null, balance:null,
      last_service_date:null, down_payment:null, percent_off:null,
      cash_discount:0, daycare_extra:0, bath:0,
      date_of_birth:null, num_pets:null, note_date:null,
      pet_name:"", breed:"", dhpp_date:null, bordetella_exp:null, rabies_exp:null,
      felv_date:null, feeding_instructions:"", food_brand:"", medication_notes:"", notes:"" };
    try {
      if (connected) {
        const {data} = await supabase.insert("clients",blank);
        const newClient = data[0];
        setRecords(p=>[...p,newClient]); setIdx(records.length); setTotal(t=>t+1);
        await supabase.insert("pets", { client_id: newClient.id, pet_name: "New Pet" });
      } else {
        const fakeId = Math.max(0,...records.map(r=>r.id))+1;
        setRecords(p=>[...p,{id:fakeId,...blank}]); setIdx(records.length); setTotal(t=>t+1);
      }
      startEdit();
    } catch(e) { showToast("Create failed: "+e.message,"error"); }
  };

  const deleteRecord = async () => {
    if (!r) return;
    try {
      if (connected) await supabase.delete("clients",r.id);
      const newRecs = records.filter(x=>x.id!==r.id);
      setRecords(newRecs); setTotal(t=>t-1);
      setIdx(Math.min(idx,newRecs.length-1));
      setConfirmDelete(false); setEditing(false);
      showToast("Record deleted");
    } catch(e) { showToast("Delete failed: "+e.message,"error"); }
  };

  const handleSearch = async () => { await fetchRecords(query); };
  const clearSearch = async () => { setQuery(""); await fetchRecords(""); };

  useEffect(()=>{
    const h = (e) => {
      if(editing||editingPet) return;
      if(e.key==="ArrowLeft"){e.preventDefault();go(idx-1);}
      if(e.key==="ArrowRight"){e.preventDefault();go(idx+1);}
    };
    window.addEventListener("keydown",h);
    return ()=>window.removeEventListener("keydown",h);
  });

  // Computed extras for display (combines daycare_extra + bath from DB)
  const displayExtras = r ? ((r.daycare_extra || 0) + (r.bath || 0)) : 0;

  // Vax status helper
  const vaxStatus = (date) => {
    const exp = isExpired(date);
    const soon = isSoon(date);
    if (exp) return { label: "EXPIRED", bg: "#dc2626", color: "white" };
    if (soon) return { label: "EXPIRING", bg: "#eab308", color: "black" };
    if (date) return { label: "CURRENT", bg: "#16a34a", color: "white" };
    return { label: "NONE", bg: "#4b5563", color: "white" };
  };xt-sm font-medium disabled:opacity-30" style={{background:"#ddd",color:"#333",border:"1px solid #aaa"}}>
                Cage Card
              </button>
            </>
          ) : (
            <>
              <button onClick={saveClient} disabled={saving} className="px-3 py-1.5 rounded text-sm font-medium text-white" style={{background:"#2e7d32"}}>
                {saving?"Saving...":"Save"}
              </button>
              <button onClick={cancelEdit} className="px-3 py-1.5 rounded text-sm" style={{background:"#ddd",color:"#333",border:"1px solid #aaa"}}>Cancel</button>
              <button onClick={()=>setConfirmDelete(true)} className="px-3 py-1.5 rounded text-sm text-white" style={{background:"#8B0000"}}>Delete</button>
            </>
          )}
        </div>
      </div>

      {/* Search */}
      <div className="px-4 py-2 flex items-center gap-2 no-print" style={{background:"#ddd", borderBottom:"1px solid #bbb"}}>
        <span className="text-xs font-semibold uppercase" style={{color:"#666"}}>Find</span>
        <input value={query} onChange={e=>setQuery(e.target.value)}
          onKeyDown={e=>e.key==="Enter"&&handleSearch()}
          placeholder="Owner, pet name, phone, address..."
          className="flex-1 px-3 py-1.5 rounded text-sm" style={{background:"#fff",color:"#111",border:"1px solid #aaa"}} />
        <button onClick={handleSearch} className="px-4 py-1.5 rounded text-sm font-medium" style={{background:"#555",color:"#fff"}}>Find</button>
        {query && <button onClick={clearSearch} className="px-3 py-1.5 rounded text-sm" style={{background:"#ccc",color:"#333",border:"1px solid #aaa"}}>Show All</button>}
      </div>

      {/* Toast */}
      {toast && (
        <div className="text-center py-2 text-sm font-medium no-print" style={{background: toast.type==="error"?"#ffebee":"#e8f5e9", color: toast.type==="error"?"#b71c1c":"#2e7d32"}}>
          {toast.msg}
        </div>
      )}

      {!r ? (
        <div className="flex items-center justify-center py-20 no-print" style={{color:"#888"}}>
          No records. {query?"Try a different search.":"Click '+ New Record' to add one."}
        </div>
      ) : (
        <div className="max-w-4xl mx-auto mt-4 px-4 pb-8 space-y-0 no-print" style={{background:"#fff", border:"1px solid #ccc", borderRadius:4}}>

          {/* ===== OWNER ROW ===== */}
          <div style={{padding:"10px 12px", borderBottom:"1px solid #ccc"}}>
            <div style={{display:"flex", justifyContent:"space-between", alignItems:"baseline", flexWrap:"wrap", gap:4}}>
              <div>
                <span style={{fontSize:11, color:"#888", marginRight:6}}>Owner:</span>
                {editing
                  ? <input value={editData.owner_name||""} onChange={e=>onClientChange("owner_name",e.target.value||null)}
                      style={{fontSize:18,fontWeight:700,border:"1px solid #bbb",borderRadius:2,padding:"2px 6px",width:220}} />
                  : <span style={{fontSize:18,fontWeight:700,color:"#111"}}>{r.owner_name}</span>
                }
              </div>
              <div style={{fontSize:13,color:"#333"}}>
                <span style={{fontSize:11,color:"#888",marginRight:4}}>Address:</span>
                {editing
                  ? <input value={editData.address||""} onChange={e=>onClientChange("address",e.target.value||null)}
                      style={{border:"1px solid #bbb",borderRadius:2,padding:"2px 6px",fontSize:13,width:260}} />
                  : (r.address || <span style={{color:"#bbb"}}>&mdash;</span>)
                }
              </div>
            </div>
            <div style={{display:"flex", gap:16, flexWrap:"wrap", marginTop:4, fontSize:13, color:"#333"}}>
              <span>
                {editing
                  ? <><span style={{fontSize:11,color:"#888"}}>Phone: </span><input value={editData.phone_primary||""} onChange={e=>onClientChange("phone_primary",e.target.value||null)} style={{border:"1px solid #bbb",borderRadius:2,padding:"1px 4px",fontSize:13,width:120}} /></>
                  : fmtPhone(r.phone_primary) || ""
                }
              </span>
              <span>
                {editing
                  ? <><span style={{fontSize:11,color:"#888"}}>Phone 2: </span><input value={editData.phone_secondary||""} onChange={e=>onClientChange("phone_secondary",e.target.value||null)} style={{border:"1px solid #bbb",borderRadius:2,padding:"1px 4px",fontSize:13,width:120}} /></>
                  : fmtPhone(r.phone_secondary) || ""
                }
              </span>
            </div>
            <div style={{display:"flex", gap:16, flexWrap:"wrap", marginTop:2, fontSize:13, color:"#333"}}>
              <span>
                <span style={{fontSize:11,color:"#888"}}>Email: </span>
                {editing
                  ? <input value={editData.email||""} onChange={e=>onClientChange("email",e.target.value||null)} style={{border:"1px solid #bbb",borderRadius:2,padding:"1px 4px",fontSize:13,width:180}} />
                  : (r.email || "")
                }
              </span>
              <span>
                <span style={{fontSize:11,color:"#888"}}>Emg: </span>
                {editing
                  ? <input value={editData.emergency_contact||""} onChange={e=>onClientChange("emergency_contact",e.target.value||null)} style={{border:"1px solid #bbb",borderRadius:2,padding:"1px 4px",fontSize:13,width:120}} />
                  : (r.emergency_contact || "")
                }
              </span>
            </div>
          </div>

          {/* ===== BOOKING ROWS (compact) ===== */}
          <div style={{padding:"6px 12px", borderBottom:"1px solid #ccc", fontSize:13}}>
            {/* Row 1: Date In, Time, # Days, Extras, Total, %Off, Balance */}
            <div style={{display:"flex", alignItems:"center", gap:12, flexWrap:"wrap", marginBottom:4}}>
              <span><span className="lbl" style={{display:"inline",width:"auto",border:"none",padding:0,background:"none"}}>Date In:</span> {editing ? <DateInput value={editData.date_in} field="date_in" onChange={onClientChange} /> : (fmtDate(r.date_in) || <span style={{color:"#bbb"}}>&mdash;</span>)}</span>
              <span><span className="lbl" style={{display:"inline",width:"auto",border:"none",padding:0,background:"none"}}>Time:</span> {editing ? <select value={editData.time_in||""} onChange={e=>onClientChange("time_in",e.target.value||null)} style={{border:"1px solid #bbb",borderRadius:2,padding:"1px 4px",fontSize:13}}><option value="">--</option>{TIME_OPTIONS.map(o=><option key={o} value={o}>{o}</option>)}</select> : <strong>{r.time_in || "--"}</strong>}</span>
              <span><span className="lbl" style={{display:"inline",width:"auto",border:"none",padding:0,background:"none"}}># Days:</span> <strong>{r.num_days ?? "--"}</strong></span>
              <span><span className="lbl" style={{display:"inline",width:"auto",border:"none",padding:0,background:"none"}}>DC/Extras:</span> {editing ? <input type="number" step="0.01" value={editData.daycare_extra??""} onChange={e=>onClientChange("daycare_extra",e.target.value?Number(e.target.value):0)} style={{border:"1px solid #bbb",borderRadius:2,padding:"1px 4px",fontSize:13,width:60}} /> : displayExtras||0}</span>
              <span><span className="lbl" style={{display:"inline",width:"auto",border:"none",padding:0,background:"none"}}>Total:</span> <strong>{r.total != null ? r.total : "--"}</strong></span>
              <span><span className="lbl" style={{display:"inline",width:"auto",border:"none",padding:0,background:"none"}}>% Off:</span> {editing ? <select value={editData.percent_off??""} onChange={e=>onClientChange("percent_off",e.target.value?Number(e.target.value):null)} style={{border:"1px solid #bbb",borderRadius:2,padding:"1px 4px",fontSize:13}}><option value="">--</option>{PERCENT_OFF_OPTIONS.map(o=><option key={o} value={o}>{o}%</option>)}</select> : (r.percent_off||0)+"%"}</span>
              <span style={{fontWeight:700}}>Balance: <span style={{color:"#8B0000"}}>${r.balance != null ? Number(r.balance).toFixed(0) : "--"}</span></span>
            </div>
            {/* Row 2: Date Out, Time Out, Price, Cash, Down */}
            <div style={{display:"flex", alignItems:"center", gap:12, flexWrap:"wrap"}}>
              <span><span className="lbl" style={{display:"inline",width:"auto",border:"none",padding:0,background:"none"}}>Date Out:</span> {editing ? <DateInput value={editData.date_out} field="date_out" onChange={onClientChange} /> : (fmtDate(r.date_out) || <span style={{color:"#bbb"}}>&mdash;</span>)}</span>
              <span><span className="lbl" style={{display:"inline",width:"auto",border:"none",padding:0,background:"none"}}>Time:</span> {editing ? <select value={editData.time_out||""} onChange={e=>onClientChange("time_out",e.target.value||null)} style={{border:"1px solid #bbb",borderRadius:2,padding:"1px 4px",fontSize:13}}><option value="">--</option>{TIME_OPTIONS.map(o=><option key={o} value={o}>{o}</option>)}</select> : <strong>{r.time_out || "--"}</strong>}</span>
              <span><span className="lbl" style={{display:"inline",width:"auto",border:"none",padding:0,background:"none"}}>Price:</span> {editing ? <select value={editData.price_per_day??""} onChange={e=>onClientChange("price_per_day",e.target.value?Number(e.target.value):null)} style={{border:"1px solid #bbb",borderRadius:2,padding:"1px 4px",fontSize:13}}><option value="">--</option>{PRICE_OPTIONS.map(o=><option key={o} value={o}>${o}</option>)}</select> : <strong>{r.price_per_day || "--"}</strong>}</span>
              <span><span className="lbl" style={{display:"inline",width:"auto",border:"none",padding:0,background:"none"}}>Cash:</span> {editing ? <input type="number" step="0.01" value={editData.cash_discount??""} onChange={e=>onClientChange("cash_discount",e.target.value?Number(e.target.value):null)} style={{border:"1px solid #bbb",borderRadius:2,padding:"1px 4px",fontSize:13,width:60}} /> : (r.cash_discount||0)}</span>
              <span><span className="lbl" style={{display:"inline",width:"auto",border:"none",padding:0,background:"none"}}>Down:</span> {editing ? <input type="number" step="0.01" value={editData.down_payment??""} onChange={e=>onClientChange("down_payment",e.target.value?Number(e.target.value):null)} style={{border:"1px solid #bbb",borderRadius:2,padding:"1px 4px",fontSize:13,width:60}} /> : (r.down_payment||0)}</span>
            </div>
            {editing && (
              <div style={{marginTop:4,fontSize:11,color:"#aaa",fontStyle:"italic"}}>
                Total = (Days x Price + Extras) minus %Off &nbsp;|&nbsp; Balance = Total - Down - Cash
              </div>
            )}
          </div>

          {/* ===== PET TABS ===== */}
          <div className="overflow-hidden">
            <div className="flex items-center justify-between" style={{padding:"4px 12px", borderBottom:"1px solid #ccc"}}>
              <span style={{fontSize:11, fontWeight:700, color:"#888", textTransform:"uppercase", letterSpacing:1}}>Pet</span>
              <div className="flex items-center gap-1">
                {!editingPet ? (
                  <>
                    <button onClick={startPetEdit} disabled={!currentPet} className="px-2 py-0.5 rounded text-xs disabled:opacity-30" style={{background:"#ddd",color:"#333",border:"1px solid #aaa"}}>Edit Pet</button>
                    <button onClick={()=>setConfirmDeletePet(true)} disabled={!currentPet} className="px-2 py-0.5 rounded text-white text-xs disabled:opacity-30" style={{background:"#8B0000"}}>Delete Pet</button>
                  </>
                ) : (
                  <>
                    <button onClick={savePet} disabled={savingPet} className="px-2 py-0.5 rounded text-white text-xs" style={{background:"#2e7d32"}}>
                      {savingPet?"Saving...":"Save Pet"}
                    </button>
                    <button onClick={cancelPetEdit} className="px-2 py-0.5 rounded text-xs" style={{background:"#ddd",color:"#333",border:"1px solid #aaa"}}>Cancel</button>
                  </>
                )}
              </div>
            </div>

            {/* Pet tab buttons */}
            <div className="flex" style={{background:"#f0f0f0", borderBottom:"1px solid #ccc"}}>
              {pets.map((p, i) => (
                <button key={p.id} onClick={() => { setPetIdx(i); setEditingPet(false); setEditPetData({}); }}
                  style={{
                    padding:"8px 16px", fontSize:13, fontWeight:500, borderRight:"1px solid #ccc",
                    background: petIdx===i ? "#fff" : "#f0f0f0",
                    color: petIdx===i ? "#111" : "#888",
                    borderBottom: petIdx===i ? "2px solid #8B0000" : "none"
                  }}>
                  {p.pet_name || "Pet "+(i+1)}
                </button>
              ))}
              {pets.length < 5 && (
                <button onClick={addPet} style={{padding:"8px 12px", fontSize:13, color:"#2e7d32", fontWeight:500, background:"transparent"}}>
                  + Add Pet
                </button>
              )}
            </div>

            {currentPet ? (
              <div style={{padding:"8px 12px"}}>
                {/* Pet name large + breed/vet/notes inline */}
                <div style={{display:"flex", alignItems:"baseline", gap:16, flexWrap:"wrap", marginBottom:6}}>
                  <div>
                    <span style={{fontSize:11,color:"#888"}}>Pet: </span>
                    {editingPet
                      ? <input value={editPetData.pet_name||""} onChange={e=>onPetChange("pet_name",e.target.value||null)} style={{fontSize:18,fontWeight:700,border:"1px solid #bbb",borderRadius:2,padding:"2px 6px",width:160}} />
                      : <span style={{fontSize:18,fontWeight:700}}>{currentPet.pet_name}</span>
                    }
                  </div>
                  <span style={{fontSize:13}}><span style={{fontSize:11,color:"#888"}}>Breed: </span>{editingPet ? <input value={editPetData.breed||""} onChange={e=>onPetChange("breed",e.target.value||null)} style={{border:"1px solid #bbb",borderRadius:2,padding:"1px 4px",fontSize:13,width:100}} /> : (currentPet.breed||"")}</span>
                  <span style={{fontSize:13}}><span style={{fontSize:11,color:"#888"}}>VET: </span>{editingPet ? <input value={editPetData.vet||""} onChange={e=>onPetChange("vet",e.target.value||null)} style={{border:"1px solid #bbb",borderRadius:2,padding:"1px 4px",fontSize:13,width:100}} /> : (currentPet.vet||"")}</span>
                  <span style={{fontSize:13}}><span style={{fontSize:11,color:"#888"}}>Notes: </span>{editingPet ? <input value={editPetData.notes||""} onChange={e=>onPetChange("notes",e.target.value||null)} style={{border:"1px solid #bbb",borderRadius:2,padding:"1px 4px",fontSize:13,width:140}} /> : (currentPet.notes||"")}</span>
                </div>

                {/* Food / Feeding row */}
                <div style={{display:"flex", gap:24, flexWrap:"wrap", marginBottom:4, fontSize:13}}>
                  <span><span style={{fontSize:11,color:"#888"}}>Food: </span>{editingPet ? <input value={editPetData.food_brand||""} onChange={e=>onPetChange("food_brand",e.target.value||null)} style={{border:"1px solid #bbb",borderRadius:2,padding:"1px 4px",fontSize:13,width:120}} /> : (currentPet.food_brand||"")}</span>
                  <span><span style={{fontSize:11,color:"#888"}}>Feeding: </span>{editingPet ? <input value={editPetData.feeding_instructions||""} onChange={e=>onPetChange("feeding_instructions",e.target.value||null)} style={{border:"1px solid #bbb",borderRadius:2,padding:"1px 4px",fontSize:13,width:200}} /> : (currentPet.feeding_instructions||"")}</span>
                </div>

                {/* Vaccines as horizontal row with colored blocks */}
                <div style={{display:"flex", gap:12, flexWrap:"wrap", marginTop:6, fontSize:13, alignItems:"center"}}>
                  {[
                    {label:"Dhrpp", field:"dhpp_date"},
                    {label:"Bord", field:"bordetella_exp"},
                    {label:"Rabies", field:"rabies_exp"},
                    {label:"FeLV", field:"felv_date"},
                  ].map(v => {
                    const date = currentPet[v.field];
                    const st = vaxStatus(date);
                    return (
                      <span key={v.field} style={{display:"inline-flex", alignItems:"center", gap:4}}>
                        <span style={{fontSize:11,color:"#888"}}>{v.label}:</span>
                        {editingPet
                          ? <DateInput value={editPetData[v.field]} field={v.field} onChange={onPetChange} />
                          : <span className="vax-pill" style={{background:st.bg, color:st.color}}>{fmtDate(date)||st.label}</span>
                        }
                      </span>
                    );
                  })}
                </div>

                {/* Meds row */}
                {(currentPet.medication_notes || editingPet) && (
                  <div style={{marginTop:6, fontSize:13}}>
                    <span style={{fontSize:11,color:"#888"}}>Meds: </span>
                    {editingPet ? <input value={editPetData.medication_notes||""} onChange={e=>onPetChange("medication_notes",e.target.value||null)} style={{border:"1px solid #bbb",borderRadius:2,padding:"1px 4px",fontSize:13,width:"80%"}} /> : currentPet.medication_notes}
                  </div>
                )}
              </div>
            ) : (
              <div className="p-8 text-center" style={{color:"#999"}}>
                No pets for this owner. Click "+ Add Pet" to create one.
              </div>
            )}
          </div>

          {/* Footer with OWNER QUICK FIND hint */}
          <div className="flex items-center justify-between px-3 py-2" style={{borderTop:"1px solid #ccc", background:"#f5f5f5"}}>
            <span className="text-xs" style={{color:"#999"}}>Use &larr; &rarr; arrow keys to navigate</span>
            <span className="text-xs font-bold tracking-wide" style={{color:"#555"}}>OWNER QUICK FIND</span>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<RJPetsApp/>);
  </script>
</body>
</html>
