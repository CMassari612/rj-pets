const SUPABASE_URL = "https://moxjbswcfwtamivwkdlr.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1veGpic3djZnd0YW1pdndrZGxyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNjY0MzUsImV4cCI6MjA5MTg0MjQzNX0.fEaXWdO8AH7jxlhC24DmGofdXeS0TkDOC5kHPi6jY48";

const supabase = {
  async _fetchPage(table, { order, from, to, search, filters }) {
    const url = new URL(`${SUPABASE_URL}/rest/v1/${table}`);
    url.searchParams.set("order", `${order}.asc`);
    if (search) url.searchParams.set("or",
      `(owner_name.ilike.%${search}%,phone_primary.ilike.%${search}%,phone_secondary.ilike.%${search}%,email.ilike.%${search}%,address.ilike.%${search}%)`);
    if (filters) Object.entries(filters).forEach(([k,v]) => url.searchParams.set(k, v));
    const res = await fetch(url, {
      headers: {
        apikey: SUPABASE_ANON_KEY,
        Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
        Prefer: "count=exact",
        Range: `${from}-${to}`,
        "Range-Unit": "items",
      },
    });
    if (!res.ok && res.status !== 206) throw new Error(await res.text());
    const cr = res.headers.get("content-range") || "";
    const count = cr.split("/")[1];
    return { data: await res.json(), count: count && count !== "*" ? parseInt(count) : null };
  },
  async getAll(table, { order = "id", search, pageSize = 1000, filters } = {}) {
    const first = await this._fetchPage(table, { order, from: 0, to: pageSize - 1, search, filters });
    const total = first.count ?? first.data.length;
    let data = first.data;
    if (total > pageSize) {
      const pages = [];
      for (let from = pageSize; from < total; from += pageSize) {
        pages.push(this._fetchPage(table, { order, from, to: from + pageSize - 1, search, filters }));
      }
      const rest = await Promise.all(pages);
      data = data.concat(...rest.map(r => r.data));
    }
    return { data, count: total };
  },
  async getByFilter(table, filters, order = "id") {
    const url = new URL(`${SUPABASE_URL}/rest/v1/${table}`);
    url.searchParams.set("order", `${order}.asc`);
    Object.entries(filters).forEach(([k,v]) => url.searchParams.set(k, v));
    const res = await fetch(url, {
      headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${SUPABASE_ANON_KEY}` },
    });
    if (!res.ok) throw new Error(await res.text());
    return { data: await res.json() };
  },
  async update(table, id, data) {
    const url = new URL(`${SUPABASE_URL}/rest/v1/${table}`);
    url.searchParams.set("id", `eq.${id}`);
    const res = await fetch(url, {
      method: "PATCH",
      headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
        "Content-Type": "application/json", Prefer: "return=representation" },
      body: JSON.stringify(data),
    });
    if (!res.ok) throw new Error(await res.text());
    return { data: await res.json() };
  },
  async insert(table, data) {
    const url = new URL(`${SUPABASE_URL}/rest/v1/${table}`);
    const res = await fetch(url, {
      method: "POST",
      headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
        "Content-Type": "application/json", Prefer: "return=representation" },
      body: JSON.stringify(data),
    });
    if (!res.ok) throw new Error(await res.text());
    return { data: await res.json() };
  },
  async delete(table, id) {
    const url = new URL(`${SUPABASE_URL}/rest/v1/${table}`);
    url.searchParams.set("id", `eq.${id}`);
    const res = await fetch(url, {
      method: "DELETE",
      headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${SUPABASE_ANON_KEY}` },
    });
    if (!res.ok) throw new Error(await res.text());
  },
};

// Helpers
const fmtPhone = (p) => {
  if (!p) return "";
  const d = p.replace(/\D/g,"");
  return d.length===10 ? `${d.slice(0,3)}-${d.slice(3,6)}-${d.slice(6)}` : p;
};
const fmtDate = (d) => {
  if (!d) return "";
  const dt = new Date(d+"T00:00:00");
  return `${dt.getMonth()+1}/${dt.getDate()}/${dt.getFullYear()}`;
};
const parseDate = (str) => {
  if (!str || !str.trim()) return null;
  const parts = str.trim().split('/');
  if (parts.length === 3) {
    const m = parseInt(parts[0]);
    const d = parseInt(parts[1]);
    let y = parseInt(parts[2]);
    if (y < 100) y += 2000;
    if (m >= 1 && m <= 12 && d >= 1 && d <= 31 && y >= 1900 && y <= 2100) {
      return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    }
  }
  return undefined;
};
const isExpired = (d) => d ? new Date(d) < new Date() : false;
const isSoon = (d) => {
  if (!d) return false;
  const dt = new Date(d), now = new Date();
  return dt > now && dt - now < 30*86400000;
};

const calcDays = (dateIn, dateOut, timeOut) => {
  if (!dateIn || !dateOut) return null;
  const d1 = new Date(dateIn+"T00:00:00");
  const d2 = new Date(dateOut+"T00:00:00");
  let days = Math.round((d2 - d1) / 86400000);
  if (days < 0) days = 0;
  if (timeOut === "PM") days += 1;
  return days || 1;
};

// Dropdown options

const MED_AMOUNT_OPTIONS = ["None","1/4","1/3","1/2","2/3","3/4","1","1 1/4","1 1/2","1 3/4","2","2 1/4","2 1/2","2 3/4","3"];

// ====== MONEY HELPERS ======
const fmtMoney = (v) => {
  const n = Number(v);
  if (isNaN(n) || v === null || v === undefined) return "$0.00";
  return "$" + n.toFixed(2);
};

// ====== MONEY INPUT (shows $X.00 on blur, raw number on focus) ======
function MoneyInput({ value, onSave, style }) {
  const [editing, setEditing] = useState(false);
  const [text, setText] = useState("");
  const numVal = Number(value) || 0;

  const handleFocus = (e) => {
    setEditing(true);
    setText(numVal === 0 ? "" : String(numVal));
    setTimeout(() => e.target.select(), 0);
  };
  const handleBlur = () => {
    setEditing(false);
    const n = Number(text) || 0;
    if (n !== numVal) onSave(n);
  };
  return editing ? (
    <input className="auto-input" type="number" step="0.01" style={{width:75,...(style||{})}}
      value={text} onChange={e => setText(e.target.value)}
      onBlur={handleBlur} onKeyDown={e => { if (e.key === "Enter") e.target.blur(); }}
      autoFocus />
  ) : (
    <span className="auto-input" style={{cursor:"text",display:"inline-block",minWidth:60,...(style||{})}}
      onClick={handleFocus} tabIndex={0} onFocus={handleFocus}>
      {fmtMoney(numVal)}
    </span>
  );
}

// ====== AUTO-SAVE DATE INPUT ======
function DateInput({ value, onSave, className }) {
  const [text, setText] = useState(fmtDate(value) || "");
  useEffect(() => { setText(fmtDate(value) || ""); }, [value]);
  const handleBlur = () => {
    if (!text.trim()) { if (value !== null) onSave(null); return; }
    const iso = parseDate(text);
    if (iso !== undefined && iso !== value) onSave(iso);
    else if (iso === undefined) setText(fmtDate(value) || "");
  };
  return (
    <input type="text" value={text} onChange={e => setText(e.target.value)}
      onBlur={handleBlur} onKeyDown={e => { if (e.key === "Enter") e.target.blur(); }}
      placeholder="M/D/YYYY" className={className || "auto-input"} style={{width:110}} />
  );
}

// ====== CAGE CARD (Redesigned - compact 4x8) ======
function CageCard({ client, pet, allPets, onClose }) {
  const print = () => {
    const cards = document.querySelectorAll('.cage-card');
    let html = '<html><head><title>Cage Card</title><style>*{margin:0;padding:0;box-sizing:border-box;}body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;font-size:11px;padding:8px;}table{border-collapse:collapse;width:100%;}td,th{border:1px solid #333;padding:2px 4px;font-size:9px;}th{background:#eee;font-weight:bold;text-align:left;}.cc{max-width:4in;padding:8px;border:1px solid #333;margin:0 auto 12px;page-break-inside:avoid;page-break-after:always;}.cc:last-child{page-break-after:auto;}</style></head><body>';
    cards.forEach(c => { html += '<div class="cc">' + c.innerHTML + '</div>'; });
    html += '<script>window.onload=function(){window.print();}<\/script></body></html>';
    // Use iframe approach - most reliable
    let iframe = document.getElementById('print-frame');
    if (!iframe) { iframe = document.createElement('iframe'); iframe.id='print-frame'; iframe.style.cssText='position:fixed;top:-9999px;left:-9999px;width:500px;height:700px;'; document.body.appendChild(iframe); }
    iframe.contentDocument.open();
    iframe.contentDocument.write(html);
    iframe.contentDocument.close();
    setTimeout(() => { iframe.contentWindow.focus(); iframe.contentWindow.print(); }, 300);
  };

  // Calculate days array for feeding schedule
  const getDaysList = () => {
    if (!client.date_in || !client.date_out) return [];
    const start = new Date(client.date_in+"T00:00:00");
    const end = new Date(client.date_out+"T00:00:00");
    const days = [];
    for (let d = new Date(start); d <= end; d.setDate(d.getDate()+1)) {
      days.push(new Date(d));
    }
    return days;
  };
  const daysList = getDaysList();
  // Split into pages of 7 days
  const pages = [];
  for (let i = 0; i < daysList.length; i += 7) {
    pages.push(daysList.slice(i, i + 7));
  }
  if (pages.length === 0) pages.push([]);

  const fmtShort = (d) => `${d.getMonth()+1}/${d.getDate()}`;

  return (
    <div className="fixed inset-0 bg-black bg-opacity-80 flex items-start justify-center z-50 overflow-auto py-4 cage-card-overlay" style={{zIndex:9999}}>
      <div style={{maxWidth:500, width:"100%"}} className="mx-4">
        <div className="flex justify-between items-center mb-2 no-print">
          <h2 className="text-white text-lg font-bold">Cage Card Preview</h2>
          <div className="flex gap-2">
            <button onClick={print} className="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-500 text-sm font-medium">Print</button>
            <button onClick={onClose} className="px-4 py-2 bg-gray-600 text-white rounded hover:bg-gray-500 text-sm">Close</button>
          </div>
        </div>

        {/* Cage card pages */}
        {pages.map((pageDays, pageIdx) => (
          <div key={pageIdx} className="cage-card bg-white text-black rounded p-4 mb-3 print-only cage-page" style={{display:"block",maxWidth:500}}>
            {/* Owner compact - no header */}
            <table style={{width:"100%",borderCollapse:"collapse",marginBottom:6}}>
              <tbody>
                <tr>
                  <th style={{border:"1px solid #333",padding:"2px 6px",background:"#eee",width:"20%",fontSize:10}}>Owner</th>
                  <td style={{border:"1px solid #333",padding:"2px 6px",fontSize:11}}>{client.owner_name}</td>
                  <th style={{border:"1px solid #333",padding:"2px 6px",background:"#eee",width:"15%",fontSize:10}}>Phone</th>
                  <td style={{border:"1px solid #333",padding:"2px 6px",fontSize:11}}>{fmtPhone(client.phone_primary)}</td>
                </tr>
                <tr>
                  <th style={{border:"1px solid #333",padding:"2px 6px",background:"#eee",fontSize:10}}>Date In</th>
                  <td style={{border:"1px solid #333",padding:"2px 6px",fontSize:11}}>{fmtDate(client.date_in)} {client.time_in||""}</td>
                  <th style={{border:"1px solid #333",padding:"2px 6px",background:"#eee",fontSize:10}}>Date Out</th>
                  <td style={{border:"1px solid #333",padding:"2px 6px",fontSize:11}}>{fmtDate(client.date_out)} {client.time_out||""}</td>
                </tr>
              </tbody>
            </table>

            {/* Pet info compact */}
            <div style={{border:"1px solid #333",padding:4,marginBottom:6}}>
              <div style={{fontWeight:"bold",fontSize:16}}>{pet.pet_name} — {pet.breed||""}</div>
              <div style={{fontSize:9,display:"flex",gap:8,flexWrap:"wrap",marginTop:2}}>
                <span>DHPP: {fmtDate(pet.dhpp_date)||"—"}</span>
                <span>Bord: {fmtDate(pet.bordetella_exp)||"—"}</span>
                <span>Rabies: {fmtDate(pet.rabies_exp)||"—"}</span>
                <span>FeLV: {fmtDate(pet.felv_date)||"—"}</span>
              </div>
              {pet.pet_belongings && <div style={{fontSize:9,marginTop:2}}>Belongings: {pet.pet_belongings}</div>}
              <div style={{fontSize:9,marginTop:1}}>Blanket: {pet.blanket||"No"}</div>
              {pet.notes && <div style={{fontSize:9,marginTop:1}}>Notes: {pet.notes}</div>}
            </div>

            {/* Daily feeding schedule boxes */}
            {pageDays.length > 0 && (
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:9}}>
                <thead>
                  <tr>
                    <th style={{border:"1px solid #333",padding:"2px 4px",background:"#eee",width:"12%"}}>Day</th>
                    <th style={{border:"1px solid #333",padding:"2px 4px",background:"#eee"}}>AM</th>
                    <th style={{border:"1px solid #333",padding:"2px 4px",background:"#eee",fontSize:8}}>Noon</th>
                    <th style={{border:"1px solid #333",padding:"2px 4px",background:"#eee"}}>PM</th>
                  </tr>
                </thead>
                <tbody>
                  {pageDays.map((day,di) => {
                    const fmtFeed = (prefix) => {
                      const k = pet[`${prefix}_kibble`], w = pet[`${prefix}_wet`], t = pet[`${prefix}_toppings`], mn = pet[`${prefix}_meds_name`], ma = pet[`${prefix}_meds_amt`];
                      const parts = [];
                      if (k && k!=="None") parts.push(`K:${k}`);
                      if (w && w!=="None") parts.push(`W:${w}`);
                      if (t) parts.push(t);
                      if (mn && ma && ma!=="None") parts.push(`${mn.slice(0,3)}:${ma}`);
                      return parts.join(", ") || "—";
                    };
                    return (
                      <tr key={di}>
                        <td style={{border:"1px solid #333",padding:"2px 4px",fontWeight:"bold"}}>{fmtShort(day)}</td>
                        <td style={{border:"1px solid #333",padding:"2px 4px"}}>{fmtFeed("feed_am")}</td>
                        <td style={{border:"1px solid #333",padding:"2px 4px"}}>{fmtFeed("feed_noon")}</td>
                        <td style={{border:"1px solid #333",padding:"2px 4px"}}>{fmtFeed("feed_pm")}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            )}
            {pages.length > 1 && <div style={{fontSize:8,textAlign:"right",marginTop:2}}>Page {pageIdx+1} of {pages.length}</div>}
          </div>
        ))}
      </div>
    </div>
  );
}

    if (!r || !connected) return;
    const id = r.id;
    // Update local state immediately
    const updated = {...r, [field]: value};
    // Recalc if needed
    if (["date_in","date_out","time_out","time_in","num_days","price_per_day","daycare_extra","percent_off","down_payment","cash_discount","bath"].includes(field)) {
      if (field === "date_in" || field === "date_out" || field === "time_out") {
        const dIn = field === "date_in" ? value : updated.date_in;
        const dOut = field === "date_out" ? value : updated.date_out;
        const tOut = field === "time_out" ? value : updated.time_out;
        updated.num_days = calcDays(dIn, dOut, tOut);
      }
      // Combine bath into extras for calc
      const days = updated.num_days || 0;
      const price = updated.price_per_day || 0;
      const extras = (updated.daycare_extra || 0) + (updated.bath || 0);
      const pctOff = updated.percent_off || 0;
      let subtotal = days * price;
      if (pctOff > 0) subtotal = subtotal * (1 - pctOff / 100);
      subtotal += extras;
      updated.total = Math.round(subtotal * 100) / 100;
      updated.balance = Math.round((updated.total - (updated.down_payment||0) - (updated.cash_discount||0)) * 100) / 100;
    }
    setRecords(p => p.map(x => x.id === id ? updated : x));
    // Save to Supabase
    try {
      const {id: _id, created_at, updated_at, ...rest} = updated;
      await supabase.update("clients", id, rest);
      showToast("Saved");
    } catch(e) { showToast("Save failed: "+e.message, "error"); }
  };

  // ====== AUTO-SAVE: save a single pet field ======
  const savePetField = async (field, value) => {
    if (!currentPet || !connected) return;
    const id = currentPet.id;
    const updated = {...currentPet, [field]: value};
    setPets(p => p.map(x => x.id === id ? updated : x));
    try {
      await supabase.update("pets", id, {[field]: value});
      showToast("Saved");
    } catch(e) { showToast("Save failed: "+e.message, "error"); }
  };

  // Fetch clients
  const fetchRecords = useCallback(async (search="") => {
    setLoading(true);
    try {
      const {data,count} = await supabase.getAll("clients",{search:search||undefined});
      let allData = data;
      if (search) {
        try {
          const petUrl = new URL(`${SUPABASE_URL}/rest/v1/pets`);
          petUrl.searchParams.set("select", "client_id");
          petUrl.searchParams.set("pet_name", `ilike.%${search}%`);
          const petRes = await fetch(petUrl, {
            headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${SUPABASE_ANON_KEY}` }
          });
          if (petRes.ok) {
            const petMatches = await petRes.json();
            const existingIds = new Set(allData.map(c => c.id));
            const newIds = [...new Set(petMatches.map(p => p.client_id))].filter(id => !existingIds.has(id));
            if (newIds.length > 0) {
              const {data: extra} = await supabase.getByFilter("clients", { id: `in.(${newIds.join(",")})` });
              allData = [...allData, ...extra];
            }
          }
        } catch {}
      }
      setRecords(allData); setTotal(allData.length); setIdx(0); setConnected(true);
    } catch {
      setRecords([]); setTotal(0); setIdx(0); setConnected(false);
    }
    setLoading(false);
  },[]);

  const fetchPets = useCallback(async (clientId) => {
    if (!clientId || !connected) { setPets([]); setPetIdx(0); return; }
    try {
      const {data} = await supabase.getByFilter("pets", { client_id: `eq.${clientId}` });
      setPets(data || []); setPetIdx(0);
    } catch { setPets([]); setPetIdx(0); }
  }, [connected]);

  useEffect(()=>{fetchRecords()},[fetchRecords]);
  useEffect(()=>{
    const client = records[idx];
    if (client) fetchPets(client.id);
    else { setPets([]); setPetIdx(0); }
  },[idx, records, fetchPets]);

  const go = (i) => { if(i>=0&&i<records.length) setIdx(i); };

  const deletePet = async () => {
    const pet = pets[petIdx];
    if (!pet) return;
    try {
      if (connected) await supabase.delete("pets", pet.id);
      const newPets = pets.filter(p => p.id !== pet.id);
      setPets(newPets);
      setPetIdx(Math.min(petIdx, Math.max(0, newPets.length - 1)));
      setConfirmDeletePet(false);
      showToast("Pet deleted");
    } catch(e) { showToast("Delete pet failed: " + e.message, "error"); }
  };

  const addPet = async () => {
    const client = records[idx];
    if (!client) return;
    const blank = {
      client_id: client.id, pet_name: "New Pet", breed: "", date_of_birth: null,
      vet: "", dhpp_date: null, bordetella_exp: null, rabies_exp: null, felv_date: null,
      medication_notes: "", feeding_instructions: "", food_brand: "", notes: "", note_date: null,
      pet_belongings: "", blanket: "No",
      feed_am_kibble: "None", feed_am_wet: "None", feed_am_toppings: "", feed_am_meds_name: "", feed_am_meds_amt: "None",
      feed_noon_kibble: "None", feed_noon_wet: "None", feed_noon_toppings: "", feed_noon_meds_name: "", feed_noon_meds_amt: "None",
      feed_pm_kibble: "None", feed_pm_wet: "None", feed_pm_toppings: "", feed_pm_meds_name: "", feed_pm_meds_amt: "None",
    };
    try {
      if (connected) {
        const {data} = await supabase.insert("pets", blank);
        setPets(p => [...p, data[0]]);
        setPetIdx(pets.length);
      }
    } catch(e) { showToast("Add pet failed: "+e.message,"error"); }
  };

  const newRecord = async () => {
    const blank = { owner_name:"New Owner", address:"", phone_primary:"", phone_secondary:"",
      email:"", emergency_contact:"", vet:"",
      date_in:null, date_out:null, time_in:"AM", time_out:"AM",
      num_days:null, price_per_day:null, total:null, balance:null,
      last_service_date:null, down_payment:null, percent_off:null,
      cash_discount:0, daycare_extra:0, bath:0,
      date_of_birth:null, num_pets:null, note_date:null,
      waiver_date: null,
      pet_name:"", breed:"", dhpp_date:null, bordetella_exp:null, rabies_exp:null,
      felv_date:null, feeding_instructions:"", food_brand:"", medication_notes:"", notes:"" };

        setRecords(p=>[...p,newClient]); setIdx(records.length); setTotal(t=>t+1);

      setRecords(newRecs); setTotal(t=>t-1);
      setIdx(Math.min(idx,newRecs.length-1));
      setConfirmDelete(false);
      showToast("Record deleted");

              <button onClick={deleteRecord} className="px-4 py-2 text-white rounded text-sm font-medium" style={{background:"#8B0000"}}>Delete</button>

              <button onClick={deletePet} className="px-4 py-2 text-white rounded text-sm font-medium" style={{background:"#8B0000"}}>Delete Pet</button>

            {connected?"LIVE":"DEMO"}

        </div>
        <div className="flex items-center gap-1.5">
          <button onClick={()=>go(0)} className="px-2 py-1 rounded text-sm" style={{background:"#ccc",color:"#333",border:"1px solid #aaa"}}>&#x23EE;</button>

          <span className="text-sm font-mono mx-2 min-w-[80px] text-center" style={{color:"#555"}}>
            {records.length>0?`${idx+1} of ${records.length}`:"0 of 0"}

          <button onClick={()=>go(idx+1)} className="px-3 py-1 rounded text-sm" style={{background:"#ccc",color:"#333",border:"1px solid #aaa"}}>&rarr;</button>
          <button onClick={()=>go(records.length-1)} className="px-2 py-1 rounded text-sm" style={{background:"#ccc",color:"#333",border:"1px solid #aaa"}}>&#x23ED;</button>
          <span className="text-xs ml-2" style={{color:"#777"}}>{total.toLocaleString()} records</span>
        </div>
        <div className="flex items-center gap-2">
          <button onClick={newRecord} className="px-3 py-1.5 rounded text-sm font-medium text-white" style={{background:"#555"}}>+ New Record</button>
          <button onClick={()=>setShowCageCard(true)} disabled={!currentPet}
            className="px-3 py-1.5 rounded text-sm font-medium disabled:opacity-30" style={{background:"#ddd",color:"#333",border:"1px solid #aaa"}}>
            Cage Card
          </button>
          <button onClick={()=>setConfirmDelete(true)} disabled={!r} className="px-3 py-1.5 rounded text-sm text-white disabled:opacity-30" style={{background:"#8B0000"}}>Delete</button>
        </div>
      </div>

      {/* Search */}
      <div className="px-4 py-2 flex items-center gap-2 no-print" style={{background:"#ddd", borderBottom:"1px solid #bbb"}}>
        <span className="text-xs font-semibold uppercase" style={{color:"#666"}}>Find</span>
        <input value={query} onChange={e=>setQuery(e.target.value)}
          onKeyDown={e=>e.key==="Enter"&&handleSearch()}
          placeholder="Owner, pet name, phone, address..."
          className="flex-1 px-3 py-1.5 rounded text-sm" style={{background:"#fff",color:"#111",border:"1px solid #aaa"}} />
        <button onClick={handleSearch} className="px-4 py-1.5 rounded text-sm font-medium" style={{background:"#555",color:"#fff"}}>Find</button>
        {query && <button onClick={clearSearch} className="px-3 py-1.5 rounded text-sm" style={{background:"#ccc",color:"#333",border:"1px solid #aaa"}}>Show All</button>}
      </div>

      {toast && (
        <div className="text-center py-1 text-xs font-medium no-print" style={{background: toast.type==="error"?"#ffebee":"#e8f5e9", color: toast.type==="error"?"#b71c1c":"#2e7d32"}}>
          {toast.msg}
        </div>
      )}

      {!r ? (
        <div className="flex items-center justify-center py-20 no-print" style={{color:"#888"}}>
          No records. {query?"Try a different search.":"Click '+ New Record' to add one."}
        </div>
      ) : (
        <div className="mx-auto mt-4 px-4 pb-8 space-y-0 no-print" style={{background:"#fff", border:"1px solid #ccc", borderRadius:4, maxWidth:1200}}>

          {/* ===== OWNER ROW (auto-save) ===== */}
          <div style={{padding:"14px 20px", borderBottom:"1px solid #ccc"}}>
            <div style={{display:"flex", justifyContent:"space-between", alignItems:"baseline", flexWrap:"wrap", gap:4}}>
              <div>
                <span style={{fontSize:14, color:"#888", marginRight:6}}>Owner:</span>
                <input className="auto-input auto-input-lg" value={r.owner_name||""} onChange={e=>setRecords(p=>p.map(x=>x.id===r.id?{...x,owner_name:e.target.value}:x))}
                  onBlur={e=>saveClientField("owner_name",e.target.value||null)} />
              </div>
              <div style={{fontSize:16}}>
                <span style={{fontSize:14,color:"#888",marginRight:4}}>Address:</span>
                <input className="auto-input" style={{width:400}} value={r.address||""} onChange={e=>setRecords(p=>p.map(x=>x.id===r.id?{...x,address:e.target.value}:x))}
                  onBlur={e=>saveClientField("address",e.target.value||null)} />
              </div>
            </div>
            <div style={{display:"flex", gap:24, flexWrap:"wrap", marginTop:6, fontSize:16}}>
              <span>
                <span style={{fontSize:12,color:"#888"}}>Phone: </span>

                  onBlur={e=>saveClientField("phone_primary",e.target.value||null)} />
              </span>

                <input className="auto-input" style={{width:260}} value={r.phone_secondary||""} onChange={e=>setRecords(p=>p.map(x=>x.id===r.id?{...x,phone_secondary:e.target.value}:x))}

              <span><span style={{fontSize:12,color:"#555",fontWeight:600}}>% Off:</span> <select className="auto-select" value={r.percent_off??""} onChange={e=>saveClientField("percent_off",e.target.value?Number(e.target.value):null)}><option value="">--</option>{PERCENT_OFF_OPTIONS.map(o=><option key={o} value={o}>{o}%</option>)}</select></span>

              <span><span style={{fontSize:12,color:"#555",fontWeight:600}}>Time:</span> <select className="auto-select" value={r.time_out||""} onChange={e=>saveClientField("time_out",e.target.value||null)}><option value="">--</option>{TIME_OPTIONS.map(o=><option key={o} value={o}>{o}</option>)}</select></span>

                      onBlur={e=>savePetField("pet_name",e.target.value||null)} />
                  </div>
                  <span style={{fontSize:16}}><span style={{fontSize:12,color:"#888"}}>Breed: </span><input className="auto-input" style={{width:180}} value={currentPet.breed||""} onChange={e=>setPets(p=>p.map(x=>x.id===currentPet.id?{...x,breed:e.target.value}:x))} onBlur={e=>savePetField("breed",e.target.value||null)} /></span>
                  <span style={{fontSize:16}}><span style={{fontSize:12,color:"#888"}}>VET: </span><input className="auto-input" style={{width:180}} value={currentPet.vet||""} onChange={e=>setPets(p=>p.map(x=>x.id===currentPet.id?{...x,vet:e.target.value}:x))} onBlur={e=>savePetField("vet",e.target.value||null)} /></span>
                  <span style={{fontSize:16}}><span style={{fontSize:12,color:"#888"}}>Notes: </span><input className="auto-input" style={{width:220}} value={currentPet.notes||""} onChange={e=>setPets(p=>p.map(x=>x.id===currentPet.id?{...x,notes:e.target.value}:x))} onBlur={e=>savePetField("notes",e.target.value||null)} /></span>
                </div>

                {/* Vaccines */}
                <div style={{display:"flex", gap:16, flexWrap:"wrap", marginBottom:8, fontSize:16, alignItems:"center"}}>
                  {[
                    {label:"Dhrpp", field:"dhpp_date"},
                    {label:"Bord", field:"bordetella_exp"},
                    {label:"Rabies", field:"rabies_exp"},
                    {label:"FeLV", field:"felv_date"},
                  ].map(v => {
                    const date = currentPet[v.field];
                    const st = vaxStatus(date);
                    return (
                      <span key={v.field} style={{display:"inline-flex", alignItems:"center", gap:4}}>
                        <span style={{fontSize:12,color:"#888"}}>{v.label}:</span>
                        <DateInput value={date} onSave={val=>savePetField(v.field,val)} />
                        <span className="vax-pill" style={{background:st.bg, color:st.color}}>{fmtDate(date)||st.label}</span>
                      </span>
                    );
                  })}
                </div>

                {/* Belongings + Blanket */}
                <div style={{display:"flex", gap:24, flexWrap:"wrap", marginBottom:6, fontSize:15}}>
                  <span><span style={{fontSize:12,color:"#888"}}>Belongings: </span><input className="auto-input" style={{width:300}} value={currentPet.pet_belongings||""} onChange={e=>setPets(p=>p.map(x=>x.id===currentPet.id?{...x,pet_belongings:e.target.value}:x))} onBlur={e=>savePetField("pet_belongings",e.target.value||"")} /></span>
                  <span><span style={{fontSize:12,color:"#888"}}>Blanket: </span>
                    <select className="auto-select" value={currentPet.blanket||"No"} onChange={e=>savePetField("blanket",e.target.value)}>
                      <option value="Yes">Yes</option>
                      <option value="No">No</option>
                    </select>
                  </span>
                </div>

                {/* Feeding AM/Noon/PM */}
                <div style={{display:"flex", gap:6, flexWrap:"wrap", marginBottom:4}}>
                  <FeedingSlot label="Feeding AM" pet={currentPet} prefix="feed_am" onSave={(f,v)=>savePetField(f,v)} />
                  <FeedingSlot label="Feeding Noon" pet={currentPet} prefix="feed_noon" onSave={(f,v)=>savePetField(f,v)} />
                  <FeedingSlot label="Feeding PM" pet={currentPet} prefix="feed_pm" onSave={(f,v)=>savePetField(f,v)} />
                </div>

                {/* Meds row (legacy - kept for existing data) */}
                {currentPet.medication_notes && (
                  <div style={{marginTop:6, fontSize:16}}>
                    <span style={{fontSize:12,color:"#888"}}>Legacy Meds: </span>
                    <input className="auto-input" style={{width:"80%"}} value={currentPet.medication_notes||""} onChange={e=>setPets(p=>p.map(x=>x.id===currentPet.id?{...x,medication_notes:e.target.value}:x))} onBlur={e=>savePetField("medication_notes",e.target.value||null)} />
                  </div>
                )}
              </div>
            ) : (
              <div className="p-8 text-center" style={{color:"#999"}}>
                No pets for this owner. Click "+ Add Pet" to create one.
              </div>
            )}
          </div>

          <div className="flex items-center justify-between px-3 py-2" style={{borderTop:"1px solid #ccc", background:"#f5f5f5"}}>
            <span className="text-xs" style={{color:"#999"}}>Use &larr; &rarr; arrow keys to navigate</span>
            <span className="text-xs font-bold tracking-wide" style={{color:"#555"}}>OWNER QUICK FIND</span>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<RJPetsApp/>);
  </script>
</body>
</html>
